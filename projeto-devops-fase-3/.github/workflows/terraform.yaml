name: terraform CI/CD

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Executar o terraform apply?"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      destroy:
        description: "Destruir ambiente ?"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      plan_destroy:
        description: "planejar o destroy do ambiente ?"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  id-token: write
  contents: read

jobs:
  jobs1:
    name: Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: arn:aws:iam::568289072493:role/github-infra-roles
          aws-region: us-east-2

      - name: HashiCorp - Setup Terraform
        uses: hashicorp/setup-terraform@v4.0.0

      - name: Terraform Init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -out=tfplan

      - name: Terraform apply
        run: terraform apply -auto-approve tfplan
        if: github.event.inputs.apply == 'true'

      - name: Terraform destroy
        run: terraform plan -destroy -out=tfplan.tfout
        if: github.event.inputs.plan_destroy == 'true'

      - name: Terraform destroy
        run: terraform apply -destroy -auto-approve tfplan.tfout
        if: github.event.inputs.destroy == 'true'
